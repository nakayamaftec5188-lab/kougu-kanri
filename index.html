<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no">
<meta name="apple-mobile-web-app-capable" content="yes">
<title>現場工具管理</title>
<style>
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
body{font-family:-apple-system,BlinkMacSystemFont,"Hiragino Sans",sans-serif;background:#f0f4f8;min-height:100vh}
button{font-family:inherit;cursor:pointer;border:none;background:none}
input,select{font-family:inherit}
.app{width:100%;max-width:480px;margin:0 auto}
.scr{position:fixed;top:0;left:0;right:0;bottom:0;max-width:480px;margin:0 auto;background:#f0f4f8;display:flex;flex-direction:column;overflow:hidden;z-index:10}
.scr.hidden{display:none}
.hdr{padding:12px 14px;display:flex;align-items:center;justify-content:space-between;flex-shrink:0}
.hdr-l{color:#fff}
.hdr-l .t1{font-size:15px;font-weight:600}
.hdr-l .t2{font-size:10px;opacity:.75;margin-top:2px}
.hdr-back,.hdr-user{background:rgba(255,255,255,.18);border:1px solid rgba(255,255,255,.3);border-radius:16px;padding:5px 11px;color:#fff;font-size:12px;cursor:pointer;font-family:inherit;display:flex;align-items:center}
.hdr-user .av{width:20px;height:20px;background:#fff;border-radius:50%;font-size:10px;font-weight:700;margin-right:5px;display:flex;align-items:center;justify-content:center}
.login-top{padding:40px 20px 28px;text-align:center;flex-shrink:0}
.login-top .icon{font-size:30px;margin-bottom:8px}
.login-top .ttl{font-size:17px;font-weight:700;color:#fff}
.scrollable{flex:1;overflow-y:auto;padding:14px}
.member-btn{width:100%;display:flex;align-items:center;background:#fff;border:1px solid #e2e8f0;border-radius:12px;padding:12px 14px;margin-bottom:7px;cursor:pointer;text-align:left}
.member-av{width:38px;height:38px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:14px;font-weight:700;margin-right:12px;flex-shrink:0}
.member-name{font-size:14px;font-weight:600;color:#1e293b;flex:1}
.arrow-r{color:#cbd5e1;font-size:18px}
.site-card{background:#fff;border:1px solid #e2e8f0;border-radius:12px;padding:14px 15px;margin-bottom:8px;cursor:pointer;display:flex;align-items:center}
.site-card-body{flex:1}
.site-name-row{display:flex;align-items:center;margin-bottom:4px}
.site-name{font-size:14px;font-weight:700;color:#1e293b}
.role-badge{font-size:10px;background:#e8f0ff;color:#1241a8;padding:1px 7px;border-radius:10px;font-weight:600;margin-left:7px}
.site-meta{font-size:11px;color:#64748b}
.warn-text{color:#dc2626;font-weight:600}
.add-btn{width:100%;padding:12px;background:#fff;border:2px dashed #cbd5e1;border-radius:12px;font-size:13px;color:#64748b;cursor:pointer;font-family:inherit;margin-top:4px}
.main-body{flex:1;display:flex;flex-direction:column;overflow:hidden;min-height:0}
.site-tabs{display:flex;background:#fff;border-bottom:1px solid #e2e8f0;overflow-x:auto;flex-shrink:0}
.site-tabs::-webkit-scrollbar{display:none}
.site-tab{padding:9px 14px;font-size:11px;font-weight:600;color:#94a3b8;white-space:nowrap;cursor:pointer;border-bottom:2px solid transparent;flex-shrink:0}
.site-tab.active{color:#1a56db;border-bottom-color:#1a56db}
.content{flex:1;overflow-y:auto;padding:10px;padding-bottom:76px}
.bottom-tabs{display:flex;background:#fff;border-top:1px solid #e2e8f0;flex-shrink:0}
.btab{flex:1;text-align:center;padding:7px 0;font-size:9px;font-weight:600;color:#94a3b8;cursor:pointer;border:none;background:none;font-family:inherit}
.btab.active{color:#1a56db}
.btab-icon{font-size:18px;display:block;margin-bottom:2px}
.fab{position:fixed;bottom:70px;right:16px;max-width:calc(480px - 16px);width:50px;height:50px;border-radius:50%;background:#f97316;color:#fff;font-size:26px;border:none;cursor:pointer;display:none;align-items:center;justify-content:center;box-shadow:0 3px 12px rgba(249,115,22,.4);z-index:50}
.tool-row{background:#fff;border:1px solid #e2e8f0;border-radius:12px;padding:10px 12px;margin-bottom:7px;display:flex;align-items:center;cursor:pointer}
.tool-img{width:60px;height:60px;border-radius:10px;background:#f1f5f9;display:flex;align-items:center;justify-content:center;font-size:28px;flex-shrink:0;margin-right:11px;overflow:hidden;position:relative}
.tool-img img{position:absolute;top:0;left:0;width:100%;height:100%;object-fit:cover}
.tool-mid{flex:1;min-width:0;margin-right:10px}
.tool-cat{display:inline-block;font-size:9px;padding:2px 7px;border-radius:10px;font-weight:600;margin-bottom:3px}
.tool-name{font-size:14px;font-weight:700;color:#1e293b;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.tool-note{font-size:10px;color:#94a3b8;margin-top:1px}
.tool-hold{font-size:10px;color:#f97316;margin-top:3px;font-weight:600}
.tool-right{text-align:right;flex-shrink:0}
.tool-qty{font-size:22px;font-weight:700;line-height:1.1}
.tool-qty.ok{color:#16a34a}
.tool-qty.danger{color:#dc2626}
.tool-qty.machine{color:#94a3b8}
.chips{display:flex;flex-wrap:wrap;margin-bottom:10px}
.chip{padding:5px 11px;font-size:11px;font-weight:500;border:1px solid #e2e8f0;border-radius:20px;color:#64748b;background:#fff;margin:0 5px 5px 0;cursor:pointer}
.chip.active{border-color:#1a56db;color:#1a56db;background:#e8f0ff}
.hist-card{background:#fff;border:1px solid #e2e8f0;border-radius:10px;padding:11px 12px;margin-bottom:6px;display:flex;align-items:flex-start}
.alert-card{background:#fff5f5;border:1px solid #fecaca;border-radius:12px;padding:11px 13px;margin-bottom:7px;display:flex;align-items:center}
.unret-card{background:#fff;border:1px solid #e2e8f0;border-radius:12px;padding:11px 13px;margin-bottom:7px}
.section-label{font-size:10px;font-weight:700;color:#64748b;padding:10px 2px 6px}
.row-header{display:flex;justify-content:space-between;align-items:center;padding:0 2px 9px}
.empty-state{text-align:center;padding:50px 20px;color:#94a3b8}
.modal-bg{display:none;position:fixed;top:0;left:0;right:0;bottom:0;max-width:480px;margin:0 auto;background:rgba(15,23,42,.55);z-index:100;align-items:flex-end}
.modal-bg.show{display:flex}
.modal{background:#fff;width:100%;border-radius:18px 18px 0 0;padding:18px 16px 34px;max-height:90vh;overflow-y:auto}
.modal-handle{width:36px;height:4px;background:#e2e8f0;border-radius:4px;margin:0 auto 14px}
.modal-title{font-size:16px;font-weight:700;color:#1e293b;margin-bottom:4px}
.modal-sub{font-size:11px;color:#64748b;margin-bottom:14px}
.lbl{font-size:11px;font-weight:600;color:#64748b;display:block;margin-bottom:4px}
.inp{width:100%;padding:10px 11px;border:1px solid #e2e8f0;border-radius:10px;font-size:16px;background:#f8fafc;color:#1e293b;margin-bottom:12px;outline:none;-webkit-appearance:none}
.inp:focus{border-color:#1a56db;background:#fff}
.sel{width:100%;padding:10px 11px;border:1px solid #e2e8f0;border-radius:10px;font-size:16px;background:#f8fafc;color:#1e293b;margin-bottom:12px;outline:none;-webkit-appearance:none}
.modal-actions{display:flex;gap:8px;margin-top:4px}
.btn-cancel{flex:1;padding:11px;background:#f1f5f9;border:1px solid #e2e8f0;border-radius:10px;font-size:13px;color:#475569;font-weight:500;cursor:pointer;font-family:inherit}
.btn-primary{flex:2;padding:11px;background:#1a56db;color:#fff;border:none;border-radius:10px;font-size:13px;font-weight:600;cursor:pointer;font-family:inherit}
.btn-danger{flex:1;padding:11px;background:#fff;color:#dc2626;border:2px solid #dc2626;border-radius:10px;font-size:13px;cursor:pointer;font-family:inherit;font-weight:500}
.btn-full{width:100%;padding:11px;border:none;border-radius:10px;font-size:13px;font-weight:600;cursor:pointer;font-family:inherit;margin-bottom:8px}
.detail-img{width:100%;height:170px;border-radius:12px;background:#f1f5f9;display:flex;align-items:center;justify-content:center;font-size:56px;margin-bottom:14px;overflow:hidden}
.detail-img img{width:100%;height:100%;object-fit:cover}
.photo-area{width:100%;height:130px;background:#f8fafc;border:2px dashed #cbd5e1;border-radius:12px;display:flex;align-items:center;justify-content:center;flex-direction:column;cursor:pointer;margin-bottom:14px;overflow:hidden;position:relative;color:#94a3b8}
.photo-area img{position:absolute;top:0;left:0;width:100%;height:100%;object-fit:cover}
.action-row{display:flex;flex-wrap:wrap;gap:6px;margin-bottom:8px}
.btn-return{flex:1;min-width:80px;padding:11px;background:#fff;color:#1a56db;border:2px solid #1a56db;border-radius:10px;font-size:13px;font-weight:600;cursor:pointer;font-family:inherit}
.btn-takeout{flex:1;min-width:80px;padding:11px;background:#1a56db;color:#fff;border:none;border-radius:10px;font-size:13px;font-weight:600;cursor:pointer;font-family:inherit}
.btn-sm{padding:11px 13px;background:#f1f5f9;color:#475569;border:none;border-radius:10px;font-size:12px;cursor:pointer;font-family:inherit}
.qty-display{text-align:center;background:#f8fafc;border:1px solid #e2e8f0;border-radius:14px;padding:18px;margin-bottom:14px}
.qty-big{font-size:42px;font-weight:700;line-height:1}
.qty-grid{display:grid;grid-template-columns:repeat(4,1fr);gap:6px;margin-bottom:14px}
.qty-btn{padding:11px 0;background:#fff;border:1px solid #e2e8f0;border-radius:10px;font-size:14px;font-weight:700;cursor:pointer;font-family:inherit}
.qty-btn.active{background:#1a56db;color:#fff;border:none}
.kana-wrap{display:flex;flex-wrap:wrap;gap:4px;margin-bottom:10px}
.kana-btn{padding:5px 9px;font-size:12px;font-weight:600;border:1px solid #e2e8f0;border-radius:20px;color:#64748b;background:#fff;cursor:pointer;font-family:inherit}
.kana-btn.active{background:#1a56db;color:#fff;border-color:#1a56db}
.toast{position:fixed;bottom:84px;left:50%;transform:translateX(-50%);background:#0f172a;color:#fff;font-size:11px;font-weight:600;padding:10px 18px;border-radius:20px;white-space:nowrap;opacity:0;transition:opacity .25s;z-index:200;pointer-events:none;max-width:90%}
.toast.show{opacity:1}
.admin-btn{width:100%;display:flex;align-items:center;padding:16px 14px;background:#fff;border:1px solid #e2e8f0;border-radius:14px;margin-bottom:9px;cursor:pointer;font-family:inherit;text-align:left;box-shadow:0 1px 4px rgba(0,0,0,.04)}
.admin-icon{width:42px;height:42px;border-radius:11px;display:flex;align-items:center;justify-content:center;font-size:20px;margin-right:13px;flex-shrink:0}
</style>
</head>
<body>
<div class="app">

<!-- 名前選択 -->
<div class="scr" id="screen-name">
  <div class="login-top hdr-bg">
    <div class="icon">🔧</div>
    <div class="ttl">現場工具管理</div>
  </div>
  <div class="scrollable" id="name-list"></div>
</div>

<!-- 現場選択 -->
<div class="scr hidden" id="screen-site">
  <div class="hdr hdr-bg">
    <div class="hdr-l"><div class="t1">現場を選択</div><div class="t2" id="site-sub"></div></div>
    <button class="hdr-back" onclick="goToName()">← 戻る</button>
  </div>
  <div class="scrollable">
    <button onclick="openCompanyStock()" style="width:100%;display:flex;align-items:center;padding:14px 16px;background:#f0fdf4;border:1px solid #bbf7d0;border-radius:12px;margin-bottom:10px;cursor:pointer;font-family:inherit;text-align:left">
      <div style="width:40px;height:40px;border-radius:10px;background:#dcfce7;display:flex;align-items:center;justify-content:center;font-size:20px;margin-right:12px;flex-shrink:0">🏢</div>
      <div style="flex:1"><div style="font-size:15px;font-weight:700;color:#15803d">会社在庫を確認</div><div style="font-size:11px;color:#16a34a;margin-top:2px">全工具の会社残数・持出し先を確認</div></div>
      <div style="color:#86efac;font-size:20px">›</div>
    </button>
    <div id="site-list"></div>
  </div>
</div>

<!-- 管理者 -->
<div class="scr hidden" id="screen-admin">
  <div class="hdr hdr-bg">
    <div class="hdr-l"><div class="t1">管理者メニュー</div><div class="t2">管理者でログイン中</div></div>
    <button class="hdr-back" onclick="goToName()">← 戻る</button>
  </div>
  <div class="scrollable">
    <div style="font-size:11px;font-weight:700;color:#64748b;margin-bottom:10px">管理メニュー</div>
    <button class="admin-btn" onclick="openMembersModal()">
      <div class="admin-icon" style="background:#e8f0ff;color:#1241a8">👥</div>
      <div style="flex:1"><div style="font-size:15px;font-weight:700;color:#1e293b">メンバー管理</div><div style="font-size:11px;color:#64748b;margin-top:2px" id="cnt-mem">追加・編集・削除</div></div>
      <div style="color:#cbd5e1;font-size:20px">›</div>
    </button>
    <button class="admin-btn" onclick="openSitesModal()">
      <div class="admin-icon" style="background:#fef3c7;color:#92400e">📍</div>
      <div style="flex:1"><div style="font-size:15px;font-weight:700;color:#1e293b">現場管理</div><div style="font-size:11px;color:#64748b;margin-top:2px" id="cnt-site">追加・編集・削除</div></div>
      <div style="color:#cbd5e1;font-size:20px">›</div>
    </button>
    <button class="admin-btn" onclick="openToolMasterModal()">
      <div class="admin-icon" style="background:#dcfce7;color:#166534">🔧</div>
      <div style="flex:1"><div style="font-size:15px;font-weight:700;color:#1e293b">工具管理</div><div style="font-size:11px;color:#64748b;margin-top:2px" id="cnt-tool">全体の工具・写真・総数管理</div></div>
      <div style="color:#cbd5e1;font-size:20px">›</div>
    </button>
    <button class="admin-btn" onclick="openAppSettings()">
      <div class="admin-icon" style="background:#f3e8ff;color:#7e22ce">⚙️</div>
      <div style="flex:1"><div style="font-size:15px;font-weight:700;color:#1e293b">アプリ設定</div><div style="font-size:11px;color:#64748b;margin-top:2px">タイトル・色・背景画像</div></div>
      <div style="color:#cbd5e1;font-size:20px">›</div>
    </button>
    <div style="font-size:11px;font-weight:700;color:#64748b;margin:18px 0 10px">通常画面へ</div>
    <button class="admin-btn" style="background:#1a56db;border:none;box-shadow:0 2px 8px rgba(26,86,219,.3)" onclick="adminGoToSites()">
      <div class="admin-icon" style="background:rgba(255,255,255,.2);color:#fff">🏗️</div>
      <div style="flex:1"><div style="font-size:15px;font-weight:700;color:#fff">工具管理画面へ</div><div style="font-size:11px;color:rgba(255,255,255,.75);margin-top:2px">在庫・履歴・アラートを確認</div></div>
      <div style="color:rgba(255,255,255,.5);font-size:20px">›</div>
    </button>
  </div>
</div>

<!-- メイン -->
<div class="scr hidden" id="screen-main">
  <div class="hdr hdr-bg">
    <div class="hdr-l"><div class="t1">現場工具管理</div><div class="t2" id="hdr-site"></div></div>
    <button class="hdr-user" onclick="confirmLogout()" style="flex-direction:column;align-items:flex-end;padding:5px 10px;gap:2px;border-radius:14px">
      <div style="display:flex;align-items:center;gap:5px">
        <div class="av" id="hdr-av" style="color:#1a56db">?</div>
        <span id="hdr-uname">---</span>
      </div>
      <span style="font-size:9px;opacity:0.75">タップしてログアウト</span>
    </button>
  </div>
  <div class="main-body">
    <div class="site-tabs" id="site-tabs"></div>
    <div class="content" id="content"></div>
    <div class="bottom-tabs">
      <button class="btab active" id="btab0" onclick="switchTab(0)"><span class="btab-icon">📦</span>在庫</button>
      <button class="btab" id="btab1" onclick="switchTab(1)"><span class="btab-icon">📋</span>履歴</button>
      <button class="btab" id="btab3" onclick="switchTab(3)"><span class="btab-icon">👷</span>現場</button>
    </div>
  </div>
  <button class="fab" id="fab" onclick="onFabTap()">＋</button>
</div>

<!-- モーダル -->
<div class="modal-bg" id="modal-bg" onclick="onModalBgClick(event)">
  <div class="modal" id="modal-inner">
    <div class="modal-handle"></div>
    <div id="modal-content"></div>
  </div>
</div>
<div class="toast" id="toast"></div>
</div>

function mkId(){return 'x'+Date.now().toString(36)+Math.floor(Math.random()*999);}
function esc(s){if(s==null)return '';return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;').replace(/'/g,'&#39;');}
function fmtFull(ts){var d=new Date(ts);return d.getFullYear()+'/'+(d.getMonth()+1)+'/'+d.getDate()+' '+('0'+d.getHours()).slice(-2)+':'+('0'+d.getMinutes()).slice(-2);}
function fmtShort(ts){var d=new Date(ts);return (d.getMonth()+1)+'/'+d.getDate()+' '+('0'+d.getHours()).slice(-2)+':'+('0'+d.getMinutes()).slice(-2);}
function toast(msg){var t=document.getElementById('toast');t.textContent=msg;t.className='toast show';if(t._t)clearTimeout(t._t);t._t=setTimeout(function(){t.className='toast';},2800);}

function closeModal(){
  // unfocus any input/textarea/select to dismiss mobile keyboard and prevent viewport zoom-stick
  var ae=document.activeElement;
  if(ae&&(ae.tagName==='INPUT'||ae.tagName==='TEXTAREA'||ae.tagName==='SELECT'))ae.blur();
  document.getElementById('modal-bg').className='modal-bg';
  // reset window scroll (mobile sometimes leaves it scrolled)
  setTimeout(function(){window.scrollTo(0,0);},50);
}

function findItem(id){return items.find(function(x){return x.id===id;})||null;}
function findSite(id){return sites.find(function(x){return x.id===id;})||null;}
function findTM(id){return TM.find(function(x){return x.id===id;})||null;}
function getHolders(iid){
  // 持出し(out)した人の純数を計算（その人が現場に持ってきた数）
  var net={}, lastTs={};
  hist.filter(function(h){return h.iid===iid;}).sort(function(a,b){return a.ts-b.ts;}).forEach(function(h){
    if(!net[h.user])net[h.user]=0;
    net[h.user]+=(h.type==='out'?h.amt:-h.amt);
    if(h.type==='out')lastTs[h.user]=h.ts;
  });
  return Object.keys(net).filter(function(u){return net[u]>0;}).map(function(u){
    return {user:u,amt:net[u],ts:lastTs[u]||0,type:'out'};
  });
}
function getOutAmt(item){
  // 現場から持出し中 = 現場割当 - 現場残数
  return Math.max(0, item.total - item.qty);
}
function getCompanyInfo(item){
  // 会社全体での状況
  // 会社残数 = TM総数 - 全現場にある数の合計
  if(!item.ref)return {total:item.total,atSites:0,inCompany:Math.max(0,item.total-item.qty)};
  var tm=findTM(item.ref); if(!tm)return {total:item.total,atSites:0,inCompany:0};
  var totalAtSites=0;
  items.forEach(function(x){
    if(x.ref===item.ref)totalAtSites+=x.qty;
  });
  return {
    total: tm.total,
    atSites: totalAtSites,
    inCompany: Math.max(0, tm.total-totalAtSites)
  };
}

function renderCompanyStock(){

      if(x.ref===tm.id){
        totalAtSites+=x.qty||0;
        if((x.qty||0)>0){var s=findSite(x.site);if(s)sitesWithTool.push({name:s.name,qty:x.qty});}

  }).sort(function(a,b){return a.inCompany-b.inCompany;});

  h+='<input id="adj-note" class="inp" type="text" placeholder="例：午前作業" value="'+(window._adjNote||'')+'">';
  h+='<div class="modal-actions"><button class="btn-cancel" onclick="closeAdjModal()">キャンセル</button><button class="btn-primary" onclick="execAdjust()">'+label+'する</button></div>';

  setTimeout(function(){var el=document.getElementById('adj-qty');if(el){el.focus();el.select();}},100);

function onAdjInput(v){qVal=Math.max(1,parseInt(v)||1);}
function adjBy(d){
  var el=document.getElementById('adj-qty');
  if(el)qVal=Math.max(1,parseInt(el.value)||1);
  qVal=Math.max(1,qVal+d);
  var item=findItem(pendId);
  var ci=getCompanyInfo(item);
  var max=pendType==='out'?ci.inCompany:item.qty;
  if(el){el.value=qVal;el.style.border=qVal>max?'2px solid #dc2626':'1px solid #e2e8f0';}
}
function saveNote(){var e=document.getElementById('adj-note');if(e)window._adjNote=e.value;}
function closeAdjModal(){window._adjNote='';closeModal();}
function execAdjust(){
  var item=findItem(pendId); if(!item)return;
  var qEl=document.getElementById('adj-qty');if(qEl)qVal=parseInt(qEl.value)||0;
  var ne=document.getElementById('adj-note'), note=ne?ne.value.trim():'';
  var amt=qVal;
  if(amt<=0){toast('数量を入力してください');return;}
  var ci=getCompanyInfo(item);
  // 持出し: 会社から現場へ → 現場qty +amt, 会社残数 -amt
  // 返却: 現場から会社へ → 現場qty -amt, 会社残数 +amt
  if(pendType==='out'){
    if(amt>ci.inCompany){toast('会社残数が足りません（残'+ci.inCompany+item.unit+'）');return;}
    item.qty+=amt;
  } else {
    if(amt>item.qty){toast('現場に返却できる工具がありません（現場'+item.qty+item.unit+'）');return;}
    item.qty-=amt;
  }
  var now=new Date(), ds=now.getFullYear()+'/'+(now.getMonth()+1)+'/'+now.getDate(), ts=('0'+now.getHours()).slice(-2)+':'+('0'+now.getMinutes()).slice(-2);
  hist.unshift({ts:Date.now(),type:pendType,iid:item.id,name:item.name,site:item.site,amt:amt,user:curUser,note:note,after:item.qty});
  window._adjNote=''; closeModal();
  toast((pendType==='out'?'📤':'📥')+' '+ds+' '+ts+' '+curUser+'が'+item.name+' '+amt+item.unit+(pendType==='out'?'を持出し':'を返却'));
  renderContent();
}

function triggerPhoto(){var e=document.getElementById('photo-inp');if(e)e.click();}
function handlePhoto(e){var f=e.target.files[0];if(!f)return;var r=new FileReader();r.onload=function(ev){photoData=ev.target.result;var a=document.getElementById('photo-area');if(a)a.innerHTML='<img src="'+ev.target.result+'" alt="">';};r.readAsDataURL(f);}
function saveItem(){
  var name=document.getElementById('im-name').value.trim();
  if(!name){toast('品目名を入力してください');return;}
  var unit=document.getElementById('im-unit').value||'個';
  var total=parseInt(document.getElementById('im-total').value)||1;
  var qty=parseInt(document.getElementById('im-qty').value)||0;
  var mach=document.getElementById('im-mach').checked;
  var note=document.getElementById('im-note').value.trim();
  var cat=document.getElementById('im-cat').value;
  var chks=document.querySelectorAll('.im-site-chk:checked');
  if(!chks.length){toast('現場を1つ以上選択してください');return;}
  var checkedSiteIds={};
  chks.forEach(function(c){checkedSiteIds[c.value]=true;});
  if(editId){
    var item=findItem(editId);
    var siblings=items.filter(function(x){return x.name===item.name&&x.cat===item.cat;});
    var sibMap={};
    siblings.forEach(function(x){sibMap[x.site]=x;});
    Object.keys(checkedSiteIds).forEach(function(sid){
      if(sibMap[sid]){
        var idx=items.findIndex(function(x){return x.id===sibMap[sid].id;});
        if(idx>=0)items[idx]=Object.assign({},sibMap[sid],{name:name,cat:cat,unit:unit,total:total,mach:mach,note:note,photo:photoData||sibMap[sid].photo});
      } else {
        items.push({id:mkId(),name:name,cat:cat,site:sid,unit:unit,total:total,qty:qty,mach:mach,note:note,photo:photoData||''});
      }
    });
    Object.keys(sibMap).forEach(function(sid){
      if(!checkedSiteIds[sid]){items=items.filter(function(x){return x.id!==sibMap[sid].id;});}
    });
    toast('更新しました');
  } else {
    var added=0;
    chks.forEach(function(chk){
      items.push({id:mkId(),name:name,cat:cat,site:chk.value,unit:unit,total:total,qty:qty,mach:mach,note:note,photo:photoData||''});
      added++;
    });
    toast('📦 '+name+' を '+added+'箇所に追加しました');
  }
  photoData='';editId=null;closeModal();renderContent();
}

      h+='<div style="display:flex;gap:4px;flex-wrap:wrap;margin-bottom:8px;padding:6px;background:#eff6ff;border-radius:8px">';

    var available=Math.max(0,t.total-otherAlloc);
    var photo=t.photo||'';
    var img=isPhoto(photo)?'<img src="'+photo+'" style="width:28px;height:28px;border-radius:6px;object-fit:cover;margin-right:9px;flex-shrink:0">':'<div style="width:28px;height:28px;border-radius:6px;background:#f1f5f9;display:flex;align-items:center;justify-content:center;font-size:14px;flex-shrink:0;margin-right:9px">'+esc(photo||'🔧')+'</div>';
    h+='<div style="display:flex;align-items:center;padding:6px 0;border-bottom:1px solid #f1f5f9">';
    h+=img;
    h+='<input type="checkbox" class="se-tool-chk" value="'+t.id+'"'+(chk?' checked':'')+' data-avail="'+available+'" style="width:16px;height:16px;margin-right:9px;accent-color:#1a56db;flex-shrink:0" onchange="seToolChkChange(this)">';
    var tc=t.cat||'工具';var tcStyle=tc==='工具'?'background:#e8f0ff;color:#1241a8':tc==='機械'?'background:#f1f5f9;color:#475569':tc==='保護具'?'background:#f0fdf4;color:#166534':tc==='消耗品'?'background:#fff7ed;color:#9a3412':'background:#fdf4ff;color:#7e22ce';

    h+='<div style="font-size:9px;color:'+(available===0?'#dc2626':'#94a3b8')+';margin-top:1px">残り '+available+esc(t.unit)+' 利用可能（総数'+t.total+'）</div>';

function clearSeKana(){window._seKana='';window._seKanaRow='';reRenderSitePicker();}
function setSeKanaRow(r){window._seKanaRow=r;window._seKana='';reRenderSitePicker();}
function collectSeTools(){
  // collect {id,qty} from current DOM state
  var result=[];
  document.querySelectorAll('.se-tool-chk').forEach(function(chk){
    if(chk.checked){
      var qEl=chk.parentElement.querySelector('.se-tool-qty');
      result.push({id:chk.value,qty:parseInt(qEl?qEl.value:0)||0});
    }
  });
  return result;
}
function reRenderSitePicker(){
  var cur=collectSeTools(); // [{id,qty}] currently visible & checked
  var s=sites[window._seIdx]; var stored=s?s.tools||[]:[];
  // build merged map: start from stored, overlay cur, remove unchecked
  var map={};
  stored.forEach(function(e){if(e&&e.id)map[e.id]=e.qty||0;});
  // apply unchecked removals
  document.querySelectorAll('.se-tool-chk:not(:checked)').forEach(function(c){delete map[c.value];});
  // apply current checks
  cur.forEach(function(e){map[e.id]=e.qty;});
  var merged=Object.keys(map).map(function(id){return {id:id,qty:map[id]};});
  window._seMergedTools=merged;
  var picker=document.getElementById('se-tool-list');
  if(!picker)return;
  var parent=picker.parentElement;
  var tmp=document.createElement('div');tmp.innerHTML=renderSiteToolPicker(merged);
  parent.replaceWith(tmp.firstChild);
}
function saveSiteEdit(el){
  var idx=parseInt(el.dataset.idx);
  if(isAdmin){
    var ce=document.getElementById('se-chief');if(ce)sites[idx].chief=ce.value;
    var l0=document.getElementById('se-l0'),l1=document.getElementById('se-l1'),l2=document.getElementById('se-l2');
    if(l0)sites[idx].leaders=[l0.value,l1?l1.value:'',l2?l2.value:''];
  }
  // collect visible state
  var visibleTools=collectSeTools();
  var s=sites[idx];
  var stored=s.tools||[];
  var map={};
  stored.forEach(function(e){if(e&&e.id)map[e.id]=e.qty||0;});
  document.querySelectorAll('.se-tool-chk:not(:checked)').forEach(function(c){delete map[c.value];});
  visibleTools.forEach(function(e){map[e.id]=e.qty;});
  if(window._seMergedTools){
    window._seMergedTools.forEach(function(e){if(!map.hasOwnProperty(e.id))map[e.id]=e.qty;});
    window._seMergedTools=null;
  }
  var finalTools=Object.keys(map).map(function(id){return {id:id,qty:map[id]};});
  // Validate: each tool's site allocation + other sites' allocation must not exceed TM.total
  for(var ti=0;ti<finalTools.length;ti++){
    var e=finalTools[ti];
    var tm=findTM(e.id); if(!tm)continue;
    var other=getOtherSitesAlloc(e.id,idx);
    if(e.qty+other>tm.total){
      toast('「'+tm.name+'」は総数'+tm.total+tm.unit+'を超えます（他現場で'+other+'使用中）');
      return;
    }
  }
  sites[idx].tools=finalTools;
  // apply to items: add missing, remove unchecked, update existing qty
  var siteId=sites[idx].id;
  var toolIds=finalTools.map(function(e){return e.id;});
  // remove items no longer in tools list
  items=items.filter(function(x){return x.site!==siteId||!x.ref||toolIds.indexOf(x.ref)>=0;});
  // add/update items for each tool
  finalTools.forEach(function(e){
    var tm=findTM(e.id); if(!tm)return;
    var existing=items.find(function(x){return x.site===siteId&&x.ref===e.id;});
    if(existing){
      var oldQty=existing.qty;
      var delta=e.qty-existing.total;
      existing.total=e.qty;
      existing.qty=Math.max(0, existing.qty+delta);
      if(existing.qty>existing.total)existing.qty=existing.total;
      existing.unit=tm.unit;
      existing.cat=tm.cat||existing.cat;
      // 履歴に記録（数量変更分）
      var diff=existing.qty-oldQty;
      if(diff!==0){
        hist.unshift({ts:Date.now(),type:diff>0?'out':'in',iid:existing.id,name:tm.name,site:siteId,amt:Math.abs(diff),user:curUser||'管理者',note:'工具追加',after:existing.qty});
      }
    }
    else{
      var newItem={id:mkId(),name:tm.name,cat:tm.cat||'工具',site:siteId,unit:tm.unit,total:e.qty,qty:e.qty,mach:false,note:'',photo:tm.photo||'',ref:tm.id};
      items.push(newItem);
      // 履歴に記録（初期持出し）
      if(e.qty>0){
        hist.unshift({ts:Date.now(),type:'out',iid:newItem.id,name:tm.name,site:siteId,amt:e.qty,user:curUser||'管理者',note:'工具追加',after:e.qty});
      }
    }
  });
  closeModal(); toast('現場情報を更新しました'); if(curSiteId)renderContent();
}
function openNewSiteModal(){

  h+='<div style="font-size:30px;margin-bottom:8px">🔧</div>';
  h+='<div id="cfg-prev" style="font-size:18px;font-weight:700;color:#fff">'+esc(cfg.title)+'</div></div>';
  h+='<label class="lbl">アプリ名</label><input id="cfg-title" class="inp" type="text" value="'+esc(cfg.title)+'" oninput="cfgPrev(this.value)">';
  h+='<label class="lbl">ヘッダーの色</label>';
  h+='<div style="display:grid;grid-template-columns:repeat(6,1fr);gap:6px;margin-bottom:14px">';
  [{bg:'#1a56db',n:'青'},{bg:'#0f766e',n:'緑'},{bg:'#dc2626',n:'赤'},{bg:'#ea580c',n:'橙'},{bg:'#7c3aed',n:'紫'},{bg:'#0891b2',n:'水'},{bg:'#475569',n:'灰'},{bg:'#1e293b',n:'黒'},{bg:'#be185d',n:'桃'},{bg:'#65a30d',n:'黄緑'},{bg:'#a16207',n:'金'},{bg:'#06b6d4',n:'空'}].forEach(function(c,i){
    h+='<button data-idx="'+i+'" onclick="setCfgColor(this)" style="width:100%;aspect-ratio:1;background:'+c.bg+';border:'+(cfg.color===c.bg?'3px solid #000':'1px solid #e2e8f0')+';border-radius:10px;cursor:pointer;color:#fff;font-size:11px;font-weight:600">'+c.n+'</button>';
  });
  h+='</div>';
  h+='<label class="lbl">背景画像（任意）</label>';
  h+='<div style="display:flex;margin-bottom:14px">';
  h+='<button onclick="triggerCfgPhoto()" style="flex:1;padding:11px;background:#f8fafc;border:1px solid #e2e8f0;border-radius:10px;font-size:12px;color:#475569;cursor:pointer;font-family:inherit;font-weight:500;margin-right:6px">📷 画像を選ぶ</button>';
  if(cfg.bg)h+='<button onclick="clearCfgBg()" style="padding:11px 14px;background:#fff;color:#dc2626;border:1px solid #dc2626;border-radius:10px;font-size:12px;cursor:pointer;font-family:inherit;font-weight:500">削除</button>';
  h+='</div>';
  h+='<input type="file" id="cfg-photo" accept="image/*" style="display:none" onchange="handleCfgPhoto(event)">';
  h+='<div class="modal-actions"><button class="btn-cancel" onclick="closeModal()">← 戻る</button><button class="btn-primary" onclick="saveCfg()">保存</button></div>';
  showModal(h);
}
var _cfgColors=[{bg:'#1a56db'},{bg:'#0f766e'},{bg:'#dc2626'},{bg:'#ea580c'},{bg:'#7c3aed'},{bg:'#0891b2'},{bg:'#475569'},{bg:'#1e293b'},{bg:'#be185d'},{bg:'#65a30d'},{bg:'#a16207'},{bg:'#06b6d4'}];
function setCfgColor(el){cfg.color=_cfgColors[parseInt(el.dataset.idx)].bg;openAppSettings();}
function cfgPrev(v){var p=document.getElementById('cfg-prev');if(p)p.textContent=v||'アプリ名';}
function triggerCfgPhoto(){var e=document.getElementById('cfg-photo');if(e)e.click();}
function handleCfgPhoto(e){var f=e.target.files[0];if(!f)return;var r=new FileReader();r.onload=function(ev){cfg.bg=ev.target.result;openAppSettings();};r.readAsDataURL(f);}
function clearCfgBg(){cfg.bg='';openAppSettings();}
function saveCfg(){var t=document.getElementById('cfg-title');if(t){var v=t.value.trim();if(v)cfg.title=v;}applyStyle();closeModal();toast('アプリ設定を保存しました');}

// ============================================================
// 初期化
// ============================================================
applyStyle();
renderNameScreen();
</script>
</body>
</html>
