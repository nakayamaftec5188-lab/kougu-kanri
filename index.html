<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no">
<meta name="apple-mobile-web-app-capable" content="yes">
<title>現場工具管理</title>
<style>
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
body{font-family:-apple-system,BlinkMacSystemFont,"Hiragino Sans",sans-serif;background:#f0f4f8;min-height:100vh}
button{font-family:inherit;cursor:pointer;border:none;background:none}
input,select{font-family:inherit}
.app{width:100%;max-width:480px;margin:0 auto}
.scr{position:fixed;top:0;left:0;right:0;bottom:0;max-width:480px;margin:0 auto;background:#f0f4f8;display:flex;flex-direction:column;overflow:hidden;z-index:10}
.scr.hidden{display:none}
.hdr{padding:12px 14px;display:flex;align-items:center;justify-content:space-between;flex-shrink:0}
.hdr-l{color:#fff}
.hdr-l .t1{font-size:15px;font-weight:600}
.hdr-l .t2{font-size:10px;opacity:.75;margin-top:2px}
.hdr-back,.hdr-user{background:rgba(255,255,255,.18);border:1px solid rgba(255,255,255,.3);border-radius:18px;padding:8px 16px;color:#fff;font-size:14px;font-weight:600;cursor:pointer;font-family:inherit;display:flex;align-items:center}
.hdr-user .av{width:20px;height:20px;background:#fff;border-radius:50%;font-size:10px;font-weight:700;margin-right:5px;display:flex;align-items:center;justify-content:center}
.login-top{padding:40px 20px 28px;text-align:center;flex-shrink:0}
.login-top .icon{font-size:30px;margin-bottom:8px}
.login-top .ttl{font-size:17px;font-weight:700;color:#fff}
.scrollable{flex:1;overflow-y:auto;padding:14px}
.member-btn{width:100%;display:flex;align-items:center;background:#fff;border:1px solid #e2e8f0;border-radius:12px;padding:12px 14px;margin-bottom:7px;cursor:pointer;text-align:left}
.member-av{width:38px;height:38px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:14px;font-weight:700;margin-right:12px;flex-shrink:0}
.member-name{font-size:14px;font-weight:600;color:#1e293b;flex:1}
.arrow-r{color:#cbd5e1;font-size:18px}
.site-card{background:#fff;border:1px solid #e2e8f0;border-radius:12px;padding:14px 15px;margin-bottom:8px;cursor:pointer;display:flex;align-items:center}
.site-card-body{flex:1}
.site-name-row{display:flex;align-items:center;margin-bottom:4px}
.site-name{font-size:14px;font-weight:700;color:#1e293b}
.role-badge{font-size:10px;background:#e8f0ff;color:#1241a8;padding:1px 7px;border-radius:10px;font-weight:600;margin-left:7px}
.site-meta{font-size:11px;color:#64748b}
.warn-text{color:#dc2626;font-weight:600}
.add-btn{width:100%;padding:12px;background:#fff;border:2px dashed #cbd5e1;border-radius:12px;font-size:13px;color:#64748b;cursor:pointer;font-family:inherit;margin-top:4px}
.main-body{flex:1;display:flex;flex-direction:column;overflow:hidden;min-height:0}
.site-tabs{display:flex;background:#fff;border-bottom:1px solid #e2e8f0;overflow-x:auto;flex-shrink:0}
.site-tabs::-webkit-scrollbar{display:none}
.site-tab{padding:9px 14px;font-size:11px;font-weight:600;color:#94a3b8;white-space:nowrap;cursor:pointer;border-bottom:2px solid transparent;flex-shrink:0}
.site-tab.active{color:#1a56db;border-bottom-color:#1a56db}
.content{flex:1;overflow-y:auto;padding:10px;padding-bottom:76px}
.bottom-tabs{display:flex;background:#fff;border-top:1px solid #e2e8f0;flex-shrink:0}
.btab{flex:1;text-align:center;padding:7px 0;font-size:9px;font-weight:600;color:#94a3b8;cursor:pointer;border:none;background:none;font-family:inherit}
.btab.active{color:#1a56db}
.btab-icon{font-size:18px;display:block;margin-bottom:2px}
.fab{position:fixed;bottom:70px;right:16px;max-width:calc(480px - 16px);width:50px;height:50px;border-radius:50%;background:#f97316;color:#fff;font-size:26px;border:none;cursor:pointer;display:none;align-items:center;justify-content:center;box-shadow:0 3px 12px rgba(249,115,22,.4);z-index:50}
.tool-row{background:#fff;border:1px solid #e2e8f0;border-radius:12px;padding:10px 12px;margin-bottom:7px;display:flex;align-items:center;cursor:pointer}
.tool-img{width:60px;height:60px;border-radius:10px;background:#fff;display:flex;align-items:center;justify-content:center;font-size:28px;flex-shrink:0;margin-right:11px;overflow:hidden;position:relative;border:1px solid #e2e8f0}
.tool-img img{position:absolute;top:0;left:0;width:100%;height:100%;object-fit:contain;background:#fff}
.tool-mid{flex:1;min-width:0;margin-right:10px}
.tool-cat{display:inline-block;font-size:9px;padding:2px 7px;border-radius:10px;font-weight:600;margin-bottom:3px}
.tool-name{font-size:14px;font-weight:700;color:#1e293b;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.tool-note{font-size:10px;color:#94a3b8;margin-top:1px}
.tool-hold{font-size:10px;color:#f97316;margin-top:3px;font-weight:600}
.tool-right{text-align:right;flex-shrink:0}
.tool-qty{font-size:22px;font-weight:700;line-height:1.1}
.tool-qty.ok{color:#16a34a}
.tool-qty.danger{color:#dc2626}
.tool-qty.machine{color:#94a3b8}
.chips{display:flex;flex-wrap:wrap;margin-bottom:10px}
.chip{padding:5px 11px;font-size:11px;font-weight:500;border:1px solid #e2e8f0;border-radius:20px;color:#64748b;background:#fff;margin:0 5px 5px 0;cursor:pointer}
.chip.active{border-color:#1a56db;color:#1a56db;background:#e8f0ff}
.hist-card{background:#fff;border:1px solid #e2e8f0;border-radius:10px;padding:11px 12px;margin-bottom:6px;display:flex;align-items:flex-start}
.alert-card{background:#fff5f5;border:1px solid #fecaca;border-radius:12px;padding:11px 13px;margin-bottom:7px;display:flex;align-items:center}
.unret-card{background:#fff;border:1px solid #e2e8f0;border-radius:12px;padding:11px 13px;margin-bottom:7px}
.section-label{font-size:10px;font-weight:700;color:#64748b;padding:10px 2px 6px}
.row-header{display:flex;justify-content:space-between;align-items:center;padding:0 2px 9px}
.empty-state{text-align:center;padding:50px 20px;color:#94a3b8}
.modal-bg{display:none;position:fixed;top:0;left:0;right:0;bottom:0;max-width:480px;margin:0 auto;background:rgba(15,23,42,.55);z-index:100;align-items:flex-end}
.modal-bg.show{display:flex}
.modal{background:#fff;width:100%;border-radius:18px 18px 0 0;padding:18px 16px 34px;max-height:90vh;overflow-y:auto}
.modal-handle{width:36px;height:4px;background:#e2e8f0;border-radius:4px;margin:0 auto 14px}
.modal-title{font-size:16px;font-weight:700;color:#1e293b;margin-bottom:4px}
.modal-sub{font-size:11px;color:#64748b;margin-bottom:14px}
.lbl{font-size:11px;font-weight:600;color:#64748b;display:block;margin-bottom:4px}
.inp{width:100%;padding:10px 11px;border:1px solid #e2e8f0;border-radius:10px;font-size:16px;background:#f8fafc;color:#1e293b;margin-bottom:12px;outline:none;-webkit-appearance:none}
.inp:focus{border-color:#1a56db;background:#fff}
.sel{width:100%;padding:10px 11px;border:1px solid #e2e8f0;border-radius:10px;font-size:16px;background:#f8fafc;color:#1e293b;margin-bottom:12px;outline:none;-webkit-appearance:none}
.modal-actions{display:flex;gap:8px;margin-top:4px}
.btn-cancel{flex:1;padding:14px;background:#f1f5f9;border:1px solid #e2e8f0;border-radius:10px;font-size:15px;color:#475569;font-weight:600;cursor:pointer;font-family:inherit}
.btn-primary{flex:2;padding:11px;background:#1a56db;color:#fff;border:none;border-radius:10px;font-size:13px;font-weight:600;cursor:pointer;font-family:inherit}
.btn-danger{flex:1;padding:11px;background:#fff;color:#dc2626;border:2px solid #dc2626;border-radius:10px;font-size:13px;cursor:pointer;font-family:inherit;font-weight:500}
.btn-full{width:100%;padding:11px;border:none;border-radius:10px;font-size:13px;font-weight:600;cursor:pointer;font-family:inherit;margin-bottom:8px}
.detail-img{width:100%;height:170px;border-radius:12px;background:#fff;display:flex;align-items:center;justify-content:center;font-size:56px;margin-bottom:14px;overflow:hidden;border:1px solid #e2e8f0}
.detail-img img{width:100%;height:100%;object-fit:contain;background:#fff}
.photo-area{width:100%;height:130px;background:#fff;border:2px dashed #cbd5e1;border-radius:12px;display:flex;align-items:center;justify-content:center;flex-direction:column;cursor:pointer;margin-bottom:14px;overflow:hidden;position:relative;color:#94a3b8}
.photo-area img{position:absolute;top:0;left:0;width:100%;height:100%;object-fit:contain;background:#fff}
.action-row{display:flex;flex-wrap:wrap;gap:6px;margin-bottom:8px}
.btn-return{flex:1;min-width:80px;padding:11px;background:#fff;color:#1a56db;border:2px solid #1a56db;border-radius:10px;font-size:13px;font-weight:600;cursor:pointer;font-family:inherit}
.btn-takeout{flex:1;min-width:80px;padding:11px;background:#1a56db;color:#fff;border:none;border-radius:10px;font-size:13px;font-weight:600;cursor:pointer;font-family:inherit}
.btn-sm{padding:11px 13px;background:#f1f5f9;color:#475569;border:none;border-radius:10px;font-size:12px;cursor:pointer;font-family:inherit}
.qty-display{text-align:center;background:#f8fafc;border:1px solid #e2e8f0;border-radius:14px;padding:18px;margin-bottom:14px}
.qty-big{font-size:42px;font-weight:700;line-height:1}
.qty-grid{display:grid;grid-template-columns:repeat(4,1fr);gap:6px;margin-bottom:14px}
.qty-btn{padding:11px 0;background:#fff;border:1px solid #e2e8f0;border-radius:10px;font-size:14px;font-weight:700;cursor:pointer;font-family:inherit}
.qty-btn.active{background:#1a56db;color:#fff;border:none}
.kana-wrap{display:flex;flex-wrap:wrap;gap:4px;margin-bottom:10px}
.kana-btn{padding:5px 9px;font-size:12px;font-weight:600;border:1px solid #e2e8f0;border-radius:20px;color:#64748b;background:#fff;cursor:pointer;font-family:inherit}
.kana-btn.active{background:#1a56db;color:#fff;border-color:#1a56db}
.toast{position:fixed;bottom:84px;left:50%;transform:translateX(-50%);background:#0f172a;color:#fff;font-size:11px;font-weight:600;padding:10px 18px;border-radius:20px;white-space:nowrap;opacity:0;transition:opacity .25s;z-index:200;pointer-events:none;max-width:90%}
.toast.show{opacity:1}
@keyframes spin{to{transform:rotate(360deg)}}
.admin-btn{width:100%;display:flex;align-items:center;padding:16px 14px;background:#fff;border:1px solid #e2e8f0;border-radius:14px;margin-bottom:9px;cursor:pointer;font-family:inherit;text-align:left;box-shadow:0 1px 4px rgba(0,0,0,.04)}
.admin-icon{width:42px;height:42px;border-radius:11px;display:flex;align-items:center;justify-content:center;font-size:20px;margin-right:13px;flex-shrink:0}
</style>
</head>
<body>
<div class="app">

<!-- 名前選択 -->
<div class="scr" id="screen-name">
  <div class="login-top hdr-bg">
    <div class="icon">🔧</div>
    <div class="ttl">現場工具管理</div>
  </div>
  <div class="scrollable" id="name-list"></div>
</div>

<!-- 現場選択 -->
<div class="scr hidden" id="screen-site">
  <div class="hdr hdr-bg">
    <div class="hdr-l"><div class="t1">現場を選択</div><div class="t2" id="site-sub"></div></div>
    <button class="hdr-back" onclick="goToName()">← 戻る</button>
  </div>
  <div class="scrollable">
    <button onclick="openRepairModal()" style="width:100%;display:flex;align-items:center;padding:14px 16px;background:#fff7ed;border:1px solid #fed7aa;border-radius:12px;margin-bottom:8px;cursor:pointer;font-family:inherit;text-align:left">
      <div style="width:40px;height:40px;border-radius:10px;background:#ffedd5;display:flex;align-items:center;justify-content:center;font-size:20px;margin-right:12px;flex-shrink:0">🔧</div>
      <div style="flex:1"><div style="font-size:15px;font-weight:700;color:#9a3412">工具修理</div><div style="font-size:11px;color:#c2410c;margin-top:2px">修理が必要な工具の登録・管理</div></div>
      <div style="color:#fdba74;font-size:20px">›</div>
    </button>
    <button onclick="openCompanyStock()" style="width:100%;display:flex;align-items:center;padding:14px 16px;background:#f0fdf4;border:1px solid #bbf7d0;border-radius:12px;margin-bottom:10px;cursor:pointer;font-family:inherit;text-align:left">
      <div style="width:40px;height:40px;border-radius:10px;background:#dcfce7;display:flex;align-items:center;justify-content:center;font-size:20px;margin-right:12px;flex-shrink:0">🏢</div>
      <div style="flex:1"><div style="font-size:15px;font-weight:700;color:#15803d">会社在庫を確認</div><div style="font-size:11px;color:#16a34a;margin-top:2px">全工具の会社残数・持出し先を確認</div></div>
      <div style="color:#86efac;font-size:20px">›</div>
    </button>
    <div id="site-list"></div>
  </div>
</div>

<!-- 管理者 -->
<div class="scr hidden" id="screen-admin">
  <div class="hdr hdr-bg">
    <div class="hdr-l"><div class="t1">管理者メニュー</div><div class="t2">管理者でログイン中</div></div>
    <button class="hdr-back" onclick="goToName()">← 戻る</button>
  </div>
  <div class="scrollable">
    <div style="font-size:11px;font-weight:700;color:#64748b;margin-bottom:10px">管理メニュー</div>
    <button class="admin-btn" onclick="openRepairModal()">
      <div class="admin-icon" style="background:#ffedd5;color:#9a3412">🔧</div>
      <div style="flex:1"><div style="font-size:15px;font-weight:700;color:#1e293b">工具修理</div><div style="font-size:11px;color:#64748b;margin-top:2px">修理登録・写真・メモ管理</div></div>
      <div style="color:#cbd5e1;font-size:20px">›</div>
    </button>
    <button class="admin-btn" onclick="openMembersModal()">
      <div class="admin-icon" style="background:#e8f0ff;color:#1241a8">👥</div>
      <div style="flex:1"><div style="font-size:15px;font-weight:700;color:#1e293b">メンバー管理</div><div style="font-size:11px;color:#64748b;margin-top:2px" id="cnt-mem">追加・編集・削除</div></div>
      <div style="color:#cbd5e1;font-size:20px">›</div>
    </button>
    <button class="admin-btn" onclick="openSitesModal()">
      <div class="admin-icon" style="background:#fef3c7;color:#92400e">📍</div>
      <div style="flex:1"><div style="font-size:15px;font-weight:700;color:#1e293b">現場管理</div><div style="font-size:11px;color:#64748b;margin-top:2px" id="cnt-site">追加・編集・削除</div></div>
      <div style="color:#cbd5e1;font-size:20px">›</div>
    </button>
    <button class="admin-btn" onclick="openToolMasterModal()">
      <div class="admin-icon" style="background:#dcfce7;color:#166534">🔧</div>
      <div style="flex:1"><div style="font-size:15px;font-weight:700;color:#1e293b">工具管理</div><div style="font-size:11px;color:#64748b;margin-top:2px" id="cnt-tool">全体の工具・写真・総数管理</div></div>
      <div style="color:#cbd5e1;font-size:20px">›</div>
    </button>
    <button class="admin-btn" onclick="openAppSettings()">
      <div class="admin-icon" style="background:#f3e8ff;color:#7e22ce">⚙️</div>
      <div style="flex:1"><div style="font-size:15px;font-weight:700;color:#1e293b">アプリ設定</div><div style="font-size:11px;color:#64748b;margin-top:2px">タイトル・色・背景画像</div></div>
      <div style="color:#cbd5e1;font-size:20px">›</div>
    </button>
  </div>
</div>

<!-- メイン -->
<div class="scr hidden" id="screen-main">
  <div class="hdr hdr-bg">
    <div class="hdr-l"><div class="t1">現場工具管理</div><div class="t2" id="hdr-site"></div></div>
    <button class="hdr-user" onclick="confirmLogout()" style="flex-direction:column;align-items:flex-end;padding:5px 10px;gap:2px;border-radius:14px">
      <div style="display:flex;align-items:center;gap:5px">
        <div class="av" id="hdr-av" style="color:#1a56db">?</div>
        <span id="hdr-uname">---</span>
      </div>
      <span style="font-size:9px;opacity:0.75">タップしてログアウト</span>
    </button>
  </div>
  <div class="main-body">
    <div class="site-tabs" id="site-tabs"></div>
    <div class="content" id="content"></div>
    <div class="bottom-tabs">
      <button class="btab active" id="btab0" onclick="switchTab(0)"><span class="btab-icon">📦</span>在庫</button>
      <button class="btab" id="btab1" onclick="switchTab(1)"><span class="btab-icon">📋</span>履歴</button>
      <button class="btab" id="btab3" onclick="switchTab(3)"><span class="btab-icon">👷</span>現場</button>
    </div>
  </div>
  <button class="fab" id="fab" onclick="onFabTap()">＋</button>
</div>

<!-- モーダル -->
<div class="modal-bg" id="modal-bg" onclick="onModalBgClick(event)">
  <div class="modal" id="modal-inner">
    <div class="modal-handle"></div>
    <div id="modal-content"></div>
  </div>
</div>
<div class="toast" id="toast"></div>
<!-- ローディングオーバーレイ -->
<div id="loading-overlay" style="display:none;position:fixed;top:0;left:0;right:0;bottom:0;max-width:480px;margin:0 auto;background:rgba(15,23,42,.72);z-index:999;align-items:center;justify-content:center;flex-direction:column">
  <div style="background:#fff;border-radius:16px;padding:28px 32px;text-align:center;min-width:180px">
    <div id="loading-spinner" style="width:40px;height:40px;border:4px solid #e2e8f0;border-top-color:#1a56db;border-radius:50%;animation:spin .8s linear infinite;margin:0 auto 14px"></div>
    <div id="loading-msg" style="font-size:13px;font-weight:600;color:#1e293b">読み込み中...</div>
  </div>
</div>
</div>

<script>

function mkId(){return 'x'+Date.now().toString(36)+Math.floor(Math.random()*999);}
function esc(s){if(s==null)return '';return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;').replace(/'/g,'&#39;');}
function fmtFull(ts){var d=new Date(ts);return d.getFullYear()+'/'+(d.getMonth()+1)+'/'+d.getDate()+' '+('0'+d.getHours()).slice(-2)+':'+('0'+d.getMinutes()).slice(-2);}
function fmtShort(ts){var d=new Date(ts);return (d.getMonth()+1)+'/'+d.getDate()+' '+('0'+d.getHours()).slice(-2)+':'+('0'+d.getMinutes()).slice(-2);}
function toast(msg){var t=document.getElementById('toast');t.textContent=msg;t.className='toast show';if(t._t)clearTimeout(t._t);t._t=setTimeout(function(){t.className='toast';},2800);}

function findSite(id){return sites.find(function(x){return x.id===id;})||null;}
function findTM(id){return TM.find(function(x){return x.id===id;})||null;}
function getHolders(iid){
  // Per-user net outstanding（純持出し数がプラスのユーザーのみ）
  var net={}, lastOutTs={};
  hist.filter(function(h){return h.iid===iid;}).sort(function(a,b){return a.ts-b.ts;}).forEach(function(h){
    if(!net[h.user])net[h.user]=0;
    net[h.user]+=(h.type==='out'?h.amt:-h.amt);
    if(net[h.user]<0)net[h.user]=0;
    if(h.type==='out')lastOutTs[h.user]=h.ts;
  });
  return Object.keys(net).filter(function(u){return net[u]>0;}).map(function(u){
    return {user:u,amt:net[u],ts:lastOutTs[u]||0,type:'out'};
  });
}
function getOutAmt(item){
  return Math.max(0, item.total - item.qty);
}
function getCompanyInfo(item){
  if(!item.ref){
    var inRep0=repairs.reduce(function(s,r){return s+(r.qty||0);},0);
    return {total:item.total,atSites:item.qty,inRepair:0,inCompany:Math.max(0,item.total-item.qty)};
  }
  var tm=findTM(item.ref);
  if(!tm)return {total:item.total,atSites:item.qty,inRepair:0,inCompany:0};
  var totalAtSites=0;
  items.forEach(function(x){if(x.ref===item.ref)totalAtSites+=x.qty||0;});
  var inRepair=repairs.filter(function(r){return r.tmId===item.ref;}).reduce(function(s,r){return s+(r.qty||1);},0);
  return {total:tm.total,atSites:totalAtSites,inRepair:inRepair,inCompany:Math.max(0,tm.total-totalAtSites-inRepair)};
}

var _trItemId=null, _trToSite='', _trQty=1, _trNote='';
function openTransfer(itemId){
  _trItemId=itemId; _trToSite=''; _trQty=1; _trNote='';
  renderTransferModal();
}
function renderTransferModal(){
  var item=findItem(_trItemId); if(!item)return;
  var tm=item.ref?findTM(item.ref):null;
  var h='<div class="modal-title">🚚 他現場へ移動：'+esc(item.name)+'</div>';
  h+='<div class="modal-sub">現在の現場（'+esc(findSite(item.site).name)+'）から別の現場へ移動します</div>';
  h+='<label class="lbl">移動先の現場</label>';
  h+='<select id="tr-site" class="sel" onchange="_trToSite=this.value">';
  h+='<option value="">移動先を選択</option>';
  sites.forEach(function(s){
    if(s.id===item.site)return;
    h+='<option value="'+s.id+'"'+(_trToSite===s.id?' selected':'')+'>'+esc(s.name)+'</option>';
  });
  h+='</select>';
  h+='<label class="lbl">移動する数量（現場残数 '+item.qty+esc(item.unit)+'）</label>';
  h+='<div style="display:flex;align-items:center;justify-content:center;gap:10px;margin-bottom:14px">';
  h+='<button onclick="trAdj(-1)" style="width:48px;height:48px;border-radius:50%;background:#f1f5f9;border:2px solid #e2e8f0;font-size:22px;font-weight:700;color:#475569;cursor:pointer;font-family:inherit">▼</button>';
  h+='<input id="tr-qty" type="number" min="1" max="'+item.qty+'" value="'+_trQty+'" inputmode="numeric" style="width:100px;font-size:28px;font-weight:700;text-align:center;padding:10px;border:1px solid #e2e8f0;border-radius:12px;background:#f8fafc;-webkit-appearance:none" oninput="_trQty=Math.max(1,parseInt(this.value)||1)">';
  h+='<button onclick="trAdj(1)" style="width:48px;height:48px;border-radius:50%;background:#f1f5f9;border:2px solid #e2e8f0;font-size:22px;font-weight:700;color:#475569;cursor:pointer;font-family:inherit">▲</button>';
  h+='</div>';
  h+='<label class="lbl">メモ（任意）</label>';
  h+='<input id="tr-note" class="inp" type="text" placeholder="例：応援作業" value="'+esc(_trNote)+'">';
  h+='<div class="modal-actions"><button class="btn-cancel" onclick="closeModal()">キャンセル</button><button class="btn-primary" onclick="execTransfer()">移動する</button></div>';
  showModal(h);
}
function trAdj(d){
  var el=document.getElementById('tr-qty');var item=findItem(_trItemId);
  if(el)_trQty=Math.max(1,parseInt(el.value)||1);
  _trQty=Math.max(1,Math.min(item.qty,_trQty+d));
  if(el)el.value=_trQty;
}
function execTransfer(){
  var item=findItem(_trItemId); if(!item)return;
  var sel=document.getElementById('tr-site');
  var toSite=sel?sel.value:'';
  if(!toSite){toast('移動先の現場を選択してください');return;}
  var qEl=document.getElementById('tr-qty');if(qEl)_trQty=parseInt(qEl.value)||0;
  var nEl=document.getElementById('tr-note');if(nEl)_trNote=nEl.value.trim();
  if(_trQty<=0){toast('数量を入力してください');return;}
  if(_trQty>item.qty){toast('現場に在庫が足りません（残'+item.qty+item.unit+'）');return;}
  // 移動元から減らす
  item.qty-=_trQty;
  // 移動先のitemを探す or 作る
  var refId=item.ref;
  var target=refId?items.find(function(x){return x.site===toSite&&x.ref===refId;}):null;
  if(target){
    target.qty+=_trQty;
  } else {
    var tm=refId?findTM(refId):null;
    items.push({id:mkId(),name:item.name,cat:item.cat,site:toSite,unit:item.unit,total:tm?tm.total:item.total,qty:_trQty,mach:item.mach,note:'',photo:item.photo,ref:refId});
    // sites.toolsにも追加
    var s=findSite(toSite);
    if(s&&refId){
      s.tools=s.tools||[];
      if(!s.tools.find(function(x){return x.id===refId;}))s.tools.push({id:refId,qty:_trQty});
    }
  }
  // 履歴記録
  var fromName=findSite(item.site).name, toName=findSite(toSite).name;
  hist.unshift({ts:Date.now(),type:'out',iid:item.id,name:item.name,site:item.site,amt:_trQty,user:curUser,note:'→'+toName+(_trNote?'（'+_trNote+'）':''),after:item.qty});
  if(target){
    hist.unshift({ts:Date.now()+1,type:'in',iid:target.id,name:target.name,site:toSite,amt:_trQty,user:curUser,note:fromName+'より'+(_trNote?'（'+_trNote+'）':''),after:target.qty});
  }
  closeModal();
  toast('🚚 '+item.name+' '+_trQty+item.unit+' を'+toName+'へ移動しました');
  renderContent();
  saveAll(null);
}

var _repKanaRow='', _repKana='';
function renderRepTmPicker(){
  var picker=document.getElementById('rep-tm-picker'); if(!picker)return;
  var curId=document.getElementById('rep-tm').value;
  var kanas=TM.reduce(function(a,t){(t.yomis||[t.yomi||'']).forEach(function(y){if(y&&a.indexOf(y)<0)a.push(y);});return a;},[]).sort();
  var activeRows={};
  kanas.forEach(function(k){var r=getKanaRow(k);if(r)activeRows[r]=true;});
  var disp=_repKana?TM.filter(function(t){return (t.yomis||[t.yomi||'']).indexOf(_repKana)>=0;}):(_repKanaRow?TM.filter(function(t){return (t.yomis||[t.yomi||'']).some(function(y){return getKanaRow(y)===_repKanaRow;});}):TM);
  var h='<div style="display:flex;gap:4px;flex-wrap:wrap;margin-bottom:6px">';
  KANA_ROWS.forEach(function(r){
    if(!activeRows[r.head])return;
    var active=_repKanaRow===r.head;
    h+='<button type="button" class="kana-btn'+(active?' active':'')+'" onclick="setRepKanaRow(\''+r.head+'\')" style="'+(active?'background:#1a56db;color:#fff;border-color:#1a56db;':'')+'min-width:32px">'+r.head+'</button>';
  });
  if(_repKanaRow||_repKana)h+='<button type="button" class="kana-btn" onclick="clearRepKana()" style="color:#dc2626;border-color:#fecaca">✕ 全て</button>';
  h+='</div>';
  if(_repKanaRow){
    var row=KANA_ROWS.find(function(r){return r.head===_repKanaRow;});
    if(row){
      h+='<div style="display:flex;gap:4px;flex-wrap:wrap;margin-bottom:8px;padding:6px;background:#eff6ff;border-radius:8px">';
      row.chars.forEach(function(c){
        if(kanas.indexOf(c)<0)return;
        var active=_repKana===c;
        h+='<button type="button" class="kana-btn'+(active?' active':'')+'" onclick="setRepKana(\''+c+'\')" style="'+(active?'background:#1a56db;color:#fff;border-color:#1a56db;':'background:#fff;')+'min-width:32px">'+c+'</button>';
      });
      h+='</div>';
    }
  }
  h+='<div style="background:#f8fafc;border:1px solid #e2e8f0;border-radius:10px;padding:8px 12px;max-height:200px;overflow-y:auto;margin-bottom:12px">';
  if(!disp.length){h+='<div style="padding:20px;text-align:center;color:#94a3b8;font-size:12px">該当する工具がありません</div>';}
  disp.forEach(function(t){
    var sel=curId===t.id;
    var photo=t.photo||'';
    var img=isPhoto(photo)?'<img src="'+photo+'" style="width:36px;height:24px;border-radius:6px;object-fit:contain;background:#fff;border:1px solid #e2e8f0;flex-shrink:0;margin-right:9px">':'<div style="width:36px;height:24px;border-radius:6px;background:#f1f5f9;display:flex;align-items:center;justify-content:center;font-size:13px;flex-shrink:0;margin-right:9px">🔧</div>';
    h+='<div onclick="selectRepTm(\''+t.id+'\')" style="display:flex;align-items:center;padding:8px 6px;border-bottom:1px solid #f1f5f9;cursor:pointer;'+(sel?'background:#eff6ff;border-radius:6px;':'')+'">';
    h+=img;
    h+='<div style="flex:1;font-size:13px;color:#1e293b;font-weight:'+(sel?'700':'500')+'">'+esc(t.name)+'</div>';
    if(sel)h+='<span style="font-size:14px;color:#1a56db">✓</span>';
    h+='</div>';
  });
  h+='</div>';
  picker.innerHTML=h;
  // 選択中の工具名を表示
  var lbl=document.getElementById('rep-tm-selected');
  if(lbl){var tm=curId?findTM(curId):null;lbl.textContent=tm?'→ '+tm.name:'';}
}
function setRepKanaRow(r){_repKanaRow=r;_repKana='';renderRepTmPicker();}
function setRepKana(k){_repKana=k;renderRepTmPicker();}
function clearRepKana(){_repKanaRow='';_repKana='';renderRepTmPicker();}
function selectRepTm(id){
  var hid=document.getElementById('rep-tm');
  if(hid)hid.value=id;
  renderRepTmPicker();
  onRepTmChange();
}
function triggerRepairPhoto(){var e=document.getElementById('repair-photo-inp');if(e)e.click();}
function handleRepairPhoto(e){
  var f=e.target.files[0];if(!f)return;
  var r=new FileReader();
  r.onload=function(ev){openCropModal(ev.target.result,'repair-photo-area',function(cropped){_repairPhoto=cropped;});};
  r.readAsDataURL(f);
}
function deleteRepairConfirm(rid,name){
  var h='<div style="text-align:center;padding:12px 0">';
  h+='<div style="font-size:44px;margin-bottom:12px">🗑️</div>';
  h+='<div style="font-size:16px;font-weight:700;color:#1e293b;margin-bottom:8px">削除しますか？</div>';
  h+='<div style="font-size:13px;color:#64748b;margin-bottom:20px">「'+esc(name)+'」の修理記録を削除します</div></div>';
  h+='<div class="modal-actions"><button class="btn-cancel" onclick="openRepairEdit(\''+rid+'\')">戻る</button><button class="btn-danger" style="flex:2" onclick="doDeleteRepair(\''+rid+'\')">削除する</button></div>';
  showModal(h);
}
function doDeleteRepair(rid){
  repairs=repairs.filter(function(r){return r.id!==rid;});
  toast('修理記録を削除しました');
  openRepairModal();
}
function repQtyAdj(d){
  var el=document.getElementById('rep-qty');if(!el)return;
  var v=parseInt(el.value)||1;
  var max=getRepairMaxQty();
  var newV=Math.max(1,v+d);
  if(max>0&&newV>max)newV=max;
  el.value=newV;
}
function getRepairMaxQty(){
  var sel=document.getElementById('rep-tm');
  if(!sel||!sel.value)return 0;
  var tm=findTM(sel.value); if(!tm)return 0;
  var atSites=0;
  items.forEach(function(x){if(x.ref===tm.id)atSites+=x.qty||0;});
  var inRep=repairs.filter(function(r){return r.tmId===tm.id&&r.id!==_repairEditId;}).reduce(function(s,r){return s+(r.qty||1);},0);
  return Math.max(0,tm.total-atSites-inRep);
}
function onRepTmChange(){
  var max=getRepairMaxQty();
  var sel=document.getElementById('rep-tm');
  var tm=sel&&sel.value?findTM(sel.value):null;
  var hint=document.getElementById('rep-qty-hint');
  if(hint)hint.textContent=tm?'（修理可能 最大'+max+tm.unit+'）':'';
  var qEl=document.getElementById('rep-qty');
  if(qEl){
    qEl.max=max||1;
    var v=parseInt(qEl.value)||1;
    if(max>0&&v>max)qEl.value=max;
  }
}
function saveRepair(){
  var tmId=document.getElementById('rep-tm').value;
  if(!tmId){toast('工具を選択してください');return;}
  var siteId=document.getElementById('rep-site').value;
  var issue=document.getElementById('rep-issue').value.trim();
  var qEl=document.getElementById('rep-qty');
  var qty=qEl?Math.max(1,parseInt(qEl.value)||1):1;
  var max=getRepairMaxQty();
  if(max>0&&qty>max){toast('修理可能数を超えています（最大'+max+'）');return;}
  if(max===0){toast('この工具は修理可能数が0です');return;}
  var tm=findTM(tmId);
  var s=null;
  if(siteId==='__company'){s={name:'会社'};}
  else if(siteId){s=findSite(siteId);}
  if(_repairEditId){
    var r=repairs.find(function(x){return x.id===_repairEditId;});
    if(r){
      r.tmId=tmId;r.toolName=tm?tm.name:'';r.siteId=siteId;r.siteName=s?s.name:'';r.issue=issue;r.photo=_repairPhoto;r.qty=qty;
      toast('更新しました');
    }
  } else {
    repairs.push({id:mkId(),ts:Date.now(),tmId:tmId,toolName:tm?tm.name:'',siteId:siteId,siteName:s?s.name:'',issue:issue,photo:_repairPhoto,qty:qty,user:curUser||''});
    toast('🔧 修理を登録しました');
  }
  _repairEditId=null;_repairPhoto='';
  openRepairModal();
  saveAll(null);
}

function openCompanyStock(){
  var h='<div class="modal-title">🏢 会社在庫</div><div class="modal-sub">全工具の会社残数と持出し先現場</div>';
  h+='<div style="max-height:60vh;overflow-y:auto;margin-bottom:12px">';
  function calcInCompany(tm){
    var atSites=items.filter(function(x){return x.ref===tm.id;}).reduce(function(s,x){return s+(x.qty||0);},0);
    var inRep=repairs.filter(function(r){return r.tmId===tm.id;}).reduce(function(s,r){return s+(r.qty||1);},0);
    return Math.max(0,tm.total-atSites-inRep);
  }
  TM.slice().sort(function(a,b){return calcInCompany(a)-calcInCompany(b);}).forEach(function(tm){
    var totalAtSites=0, sitesWithTool=[];
    items.forEach(function(x){
      if(x.ref===tm.id){
        totalAtSites+=x.qty||0;
        if((x.qty||0)>0){var s=findSite(x.site);if(s)sitesWithTool.push({name:s.name,qty:x.qty});}
      }
    });
    var inRep=repairs.filter(function(r){return r.tmId===tm.id;}).reduce(function(s,r){return s+(r.qty||1);},0);
    var inCompany=Math.max(0,tm.total-totalAtSites-inRep);
    var low=inCompany<=5;
    var photo=tm.photo||'';

function onAdjInput(v){qVal=Math.max(1,parseInt(v)||1);}
function adjBy(d){
  var el=document.getElementById('adj-qty');
  if(el)qVal=Math.max(1,parseInt(el.value)||1);
  qVal=Math.max(1,qVal+d);
  var item=findItem(pendId);
  var ci=getCompanyInfo(item);
  var max=pendType==='out'?ci.inCompany:item.qty;
  if(el){el.value=qVal;el.style.border=qVal>max?'2px solid #dc2626':'1px solid #e2e8f0';}
}
function saveNote(){var e=document.getElementById('adj-note');if(e)window._adjNote=e.value;}
function closeAdjModal(){window._adjNote='';closeModal();}
function execAdjust(){
  var item=findItem(pendId); if(!item)return;
  var qEl=document.getElementById('adj-qty');if(qEl)qVal=parseInt(qEl.value)||0;
  var ne=document.getElementById('adj-note'), note=ne?ne.value.trim():'';
  var amt=qVal;
  if(amt<=0){toast('数量を入力してください');return;}
  var ci=getCompanyInfo(item);
  if(pendType==='out'){
    if(amt>ci.inCompany){toast('会社残数が足りません（残'+ci.inCompany+item.unit+'）');return;}
    item.qty+=amt;
  } else {
    if(amt>item.qty){toast('現場に返却できる工具がありません（現場'+item.qty+item.unit+'）');return;}
    item.qty-=amt;
  }
  var now=new Date(), ds=now.getFullYear()+'/'+(now.getMonth()+1)+'/'+now.getDate(), ts=('0'+now.getHours()).slice(-2)+':'+('0'+now.getMinutes()).slice(-2);
  var hEntry={ts:Date.now(),type:pendType,iid:item.id,name:item.name,site:item.site,amt:amt,user:curUser,note:note,after:item.qty};
  hist.unshift(hEntry);
  window._adjNote=''; closeModal();
  toast((pendType==='out'?'📤':'📥')+' '+ds+' '+ts+' '+curUser+'が'+item.name+' '+amt+item.unit+(pendType==='out'?'を持出し':'を返却'));
  renderContent();
  // GASへ差分送信
  gasAdjust(hEntry, item.qty, null);
}

function triggerPhoto(){var e=document.getElementById('photo-inp');if(e)e.click();}
function handlePhoto(e){
  var f=e.target.files[0];if(!f)return;
  var r=new FileReader();
  r.onload=function(ev){openCropModal(ev.target.result,'photo-area',function(cropped){photoData=cropped;});};
  r.readAsDataURL(f);
}
function saveItem(){
  var name=document.getElementById('im-name').value.trim();
  if(!name){toast('品目名を入力してください');return;}
  var unit=document.getElementById('im-unit').value||'個';
  var total=parseInt(document.getElementById('im-total').value)||1;
  var qty=parseInt(document.getElementById('im-qty').value)||0;
  var mach=document.getElementById('im-mach').checked;
  var note=document.getElementById('im-note').value.trim();
  var cat=document.getElementById('im-cat').value;
  var chks=document.querySelectorAll('.im-site-chk:checked');
  if(!chks.length){toast('現場を1つ以上選択してください');return;}
  var checkedSiteIds={};
  chks.forEach(function(c){checkedSiteIds[c.value]=true;});
  if(editId){
    var item=findItem(editId);
    var siblings=items.filter(function(x){return x.name===item.name&&x.cat===item.cat;});
    var sibMap={};
    siblings.forEach(function(x){sibMap[x.site]=x;});
    Object.keys(checkedSiteIds).forEach(function(sid){
      if(sibMap[sid]){
        var idx=items.findIndex(function(x){return x.id===sibMap[sid].id;});
        if(idx>=0)items[idx]=Object.assign({},sibMap[sid],{name:name,cat:cat,unit:unit,total:total,mach:mach,note:note,photo:photoData||sibMap[sid].photo});
      } else {
        items.push({id:mkId(),name:name,cat:cat,site:sid,unit:unit,total:total,qty:qty,mach:mach,note:note,photo:photoData||''});
      }
    });
    Object.keys(sibMap).forEach(function(sid){
      if(!checkedSiteIds[sid]){items=items.filter(function(x){return x.id!==sibMap[sid].id;});}
    });
    toast('更新しました');
  } else {
    var added=0;
    chks.forEach(function(chk){
      items.push({id:mkId(),name:name,cat:cat,site:chk.value,unit:unit,total:total,qty:qty,mach:mach,note:note,photo:photoData||''});
      added++;
    });
    toast('📦 '+name+' を '+added+'箇所に追加しました');
  }
  photoData='';editId=null;closeModal();renderContent();
  saveAll(null);
}

    h+=img;
    h+='<input type="checkbox" class="se-tool-chk" value="'+t.id+'"'+(chk?' checked':'')+' style="width:16px;height:16px;margin-right:9px;accent-color:#1a56db;flex-shrink:0" onchange="seToolChkChange(this)">';

function seToolQtyAdj(btn,d){
  var row=btn.parentElement;
  var qEl=row.querySelector('.se-tool-qty');
  if(!qEl||qEl.disabled)return;
  var v=parseInt(qEl.value)||0;
  qEl.value=Math.max(0,v+d);
}
function seToolChkChange(el){
  var row=el.parentElement;
  var qEl=row.querySelector('.se-tool-qty');
  if(!qEl)return;
  qEl.disabled=!el.checked;
  qEl.style.background=el.checked?'#fff':'#f1f5f9';
  if(el.checked&&(!qEl.value||qEl.value==='0'))qEl.value='1';
  // ▲▼ボタンの有効化
  row.querySelectorAll('button').forEach(function(b){
    b.disabled=!el.checked;
    b.style.background=el.checked?'#f1f5f9':'#f8fafc';
  });
}
function clearSeKana(){window._seKana='';window._seKanaRow='';reRenderSitePicker();}
function setSeKanaRow(r){window._seKanaRow=r;window._seKana='';reRenderSitePicker();}
function setSeKana(k){window._seKana=k;reRenderSitePicker();}
function collectSeTools(){
  // collect {id,qty} from current DOM state
  var result=[];
  document.querySelectorAll('.se-tool-chk').forEach(function(chk){
    if(chk.checked){
      var row=chk.parentElement;
      var qEl=row.querySelector('.se-tool-qty');
      result.push({id:chk.value,qty:parseInt(qEl?qEl.value:0)||0});
    }
  });
  return result;
}
function reRenderSitePicker(){
  var cur=collectSeTools(); // [{id,qty}] currently visible & checked
  var s=sites[window._seIdx]; var stored=s?s.tools||[]:[];
  // build merged map: start from stored, overlay cur, remove unchecked
  var map={};
  stored.forEach(function(e){if(e&&e.id)map[e.id]=e.qty||0;});
  // apply unchecked removals
  document.querySelectorAll('.se-tool-chk:not(:checked)').forEach(function(c){delete map[c.value];});
  // apply current checks
  cur.forEach(function(e){map[e.id]=e.qty;});
  var merged=Object.keys(map).map(function(id){return {id:id,qty:map[id]};});
  window._seMergedTools=merged;
  var picker=document.getElementById('se-tool-list');
  if(!picker)return;
  var parent=picker.parentElement;
  var tmp=document.createElement('div');tmp.innerHTML=renderSiteToolPicker(merged);
  parent.replaceWith(tmp.firstChild);
}
function saveSiteEdit(el){
  var idx=parseInt(el.dataset.idx);
  if(isAdmin){
    var ce=document.getElementById('se-chief');if(ce)sites[idx].chief=ce.value;
    var l0=document.getElementById('se-l0'),l1=document.getElementById('se-l1'),l2=document.getElementById('se-l2');
    if(l0)sites[idx].leaders=[l0.value,l1?l1.value:'',l2?l2.value:''];
  }
  // collect visible state
  var visibleTools=collectSeTools();
  var s=sites[idx];
  var stored=s.tools||[];
  var map={};
  stored.forEach(function(e){if(e&&e.id)map[e.id]=e.qty||0;});
  document.querySelectorAll('.se-tool-chk:not(:checked)').forEach(function(c){delete map[c.value];});
  visibleTools.forEach(function(e){map[e.id]=e.qty;});
  if(window._seMergedTools){
    window._seMergedTools.forEach(function(e){if(!map.hasOwnProperty(e.id))map[e.id]=e.qty;});
    window._seMergedTools=null;
  }
  var finalTools=Object.keys(map).map(function(id){return {id:id,qty:map[id]};});
  sites[idx].tools=finalTools;
  // apply to items: add missing, remove unchecked, update existing qty
  var siteId=sites[idx].id;
  var toolIds=finalTools.map(function(e){return e.id;});
  // remove items no longer in tools list
  items=items.filter(function(x){return x.site!==siteId||!x.ref||toolIds.indexOf(x.ref)>=0;});
  // add/update items for each tool
  finalTools.forEach(function(e){
    var tm=findTM(e.id); if(!tm)return;
    var existing=items.find(function(x){return x.site===siteId&&x.ref===e.id;});
    if(existing){existing.total=tm.total;existing.unit=tm.unit;existing.cat=tm.cat||existing.cat;}
    else{items.push({id:mkId(),name:tm.name,cat:tm.cat||'工具',site:siteId,unit:tm.unit,total:tm.total,qty:e.qty,mach:false,note:'',photo:tm.photo||'',ref:tm.id});}
  });
  closeModal(); toast('現場情報を更新しました'); if(curSiteId)renderContent();
  saveAll(null);
}

  h+='<button onclick="triggerCfgPhoto()" style="flex:1;padding:11px;background:#f8fafc;border:1px solid #e2e8f0;border-radius:10px;font-size:12px;color:#475569;cursor:pointer;font-family:inherit;font-weight:500;margin-right:6px">📷 画像を選ぶ</button>';
  if(cfg.bg)h+='<button onclick="clearCfgBg()" style="padding:11px 14px;background:#fff;color:#dc2626;border:1px solid #dc2626;border-radius:10px;font-size:12px;cursor:pointer;font-family:inherit;font-weight:500">削除</button>';
  h+='</div>';
  h+='<input type="file" id="cfg-photo" accept="image/*" style="display:none" onchange="handleCfgPhoto(event)">';
  h+='<div class="modal-actions"><button class="btn-cancel" onclick="closeModal()">← 戻る</button><button class="btn-primary" onclick="saveCfg()">保存</button></div>';
  showModal(h);
}
var _cfgColors=[{bg:'#1a56db'},{bg:'#0f766e'},{bg:'#dc2626'},{bg:'#ea580c'},{bg:'#7c3aed'},{bg:'#0891b2'},{bg:'#475569'},{bg:'#1e293b'},{bg:'#be185d'},{bg:'#65a30d'},{bg:'#a16207'},{bg:'#06b6d4'}];
function setCfgColor(el){cfg.color=_cfgColors[parseInt(el.dataset.idx)].bg;openAppSettings();}
function cfgPrev(v){var p=document.getElementById('cfg-prev');if(p)p.textContent=v||'アプリ名';}
function triggerCfgPhoto(){var e=document.getElementById('cfg-photo');if(e)e.click();}
function handleCfgPhoto(e){var f=e.target.files[0];if(!f)return;var r=new FileReader();r.onload=function(ev){cfg.bg=ev.target.result;openAppSettings();};r.readAsDataURL(f);}
function clearCfgBg(){cfg.bg='';openAppSettings();}
function saveCfg(){var t=document.getElementById('cfg-title');if(t){var v=t.value.trim();if(v)cfg.title=v;}applyStyle();closeModal();toast('アプリ設定を保存しました');saveAll(null);}

// ============================================================
// 写真クロップ
// ============================================================
var _cropCallback=null, _cropSrc='', _cropTargetId='';
var _cropScale=1, _cropX=0, _cropY=0;
var _cropDragStart=null, _cropLastPinchDist=0;

function openCropModal(src, targetId, callback){
  _cropSrc=src; _cropTargetId=targetId; _cropCallback=callback;
  _cropScale=1; _cropX=0; _cropY=0;
  var h='<div class="modal-title">📷 写真を調整</div>';
  h+='<div class="modal-sub">ドラッグで移動 ・ ピンチまたはスライダーで拡縮</div>';
  // crop viewport
  h+='<div id="crop-viewport" style="width:100%;aspect-ratio:16/9;background:#fff;border-radius:12px;overflow:hidden;position:relative;touch-action:none;user-select:none;cursor:grab;margin-bottom:10px;border:2px dashed #1a56db;box-shadow:inset 0 0 0 1px rgba(255,255,255,0.5)">';
  h+='<img id="crop-img" src="'+src+'" draggable="false" style="position:absolute;transform-origin:center center;max-width:none;user-select:none;pointer-events:none">';
  h+='<div style="position:absolute;top:50%;left:50%;transform:translate(-50%,-50%);background:rgba(26,86,219,0.85);color:#fff;font-size:10px;padding:3px 8px;border-radius:6px;pointer-events:none;font-weight:600">登録範囲</div>';
  h+='</div>';
  // zoom slider
  h+='<div style="display:flex;align-items:center;gap:8px;margin-bottom:14px">';
  h+='<span style="font-size:13px">🔍</span>';
  h+='<input id="crop-zoom" type="range" min="0.3" max="4" step="0.05" value="1" style="flex:1;accent-color:#1a56db" oninput="onCropZoom(this.value)">';
  h+='<span style="font-size:13px">＋</span>';
  h+='</div>';
  h+='<div class="modal-actions">';
  h+='<button class="btn-cancel" onclick="closeCropModal()">キャンセル</button>';
  h+='<button class="btn-primary" onclick="cropApply()">この位置で確定</button>';
  h+='</div>';
  // Use a separate overlay so it sits above the main modal
  var overlay=document.createElement('div');
  overlay.id='crop-overlay';
  overlay.style.cssText='position:fixed;top:0;left:0;right:0;bottom:0;max-width:480px;margin:0 auto;background:rgba(15,23,42,.7);z-index:200;display:flex;align-items:flex-end';
  var box=document.createElement('div');
  box.style.cssText='background:#fff;width:100%;border-radius:18px 18px 0 0;padding:18px 16px 34px;max-height:90vh;overflow-y:auto';
  box.innerHTML='<div style="width:36px;height:4px;background:#e2e8f0;border-radius:4px;margin:0 auto 14px"></div>'+h;
  overlay.appendChild(box);
  document.body.appendChild(overlay);
  requestAnimationFrame(function(){_cropInitImg();_cropBindEvents();setTimeout(function(){var lbl=document.querySelector('#crop-viewport > div');if(lbl)lbl.style.opacity='0';lbl&&(lbl.style.transition='opacity 0.5s');},1500);});
}
function closeCropModal(){
  var o=document.getElementById('crop-overlay');if(o)o.remove();
}
function _cropInitImg(){
  var img=document.getElementById('crop-img');
  var vp=document.getElementById('crop-viewport');
  if(!img||!vp)return;
  img.onload=function(){
    var vw=vp.offsetWidth, vh=vp.offsetHeight;
    var iw=img.naturalWidth, ih=img.naturalHeight;
    // cover: 短辺がviewportを覆うように
    var fitScale=Math.max(vw/iw, vh/ih);
    _cropScale=fitScale;
    _cropX=(vw-iw*fitScale)/2;
    _cropY=(vh-ih*fitScale)/2;
    _cropApplyTransform();
    var zs=document.getElementById('crop-zoom');
    if(zs){zs.min=fitScale;zs.max=fitScale*5;zs.step=fitScale*0.05;zs.value=fitScale;}
  };
  if(img.complete&&img.naturalWidth)img.onload();
}
function _cropApplyTransform(){
  var img=document.getElementById('crop-img');
  if(!img)return;
  img.style.transform='translate('+_cropX+'px,'+_cropY+'px) scale('+_cropScale+')';
  img.style.transformOrigin='0 0';
}
function onCropZoom(v){
  var img=document.getElementById('crop-img');
  var vp=document.getElementById('crop-viewport');
  if(!img||!vp)return;
  var oldScale=_cropScale, newScale=parseFloat(v);
  var vw=vp.offsetWidth, vh=vp.offsetHeight;
  var cx=vw/2, cy=vh/2;
  _cropX=cx-(cx-_cropX)*newScale/oldScale;
  _cropY=cy-(cy-_cropY)*newScale/oldScale;
  _cropScale=newScale;
  _cropApplyTransform();
}
function _cropBindEvents(){
  var vp=document.getElementById('crop-viewport');if(!vp)return;
  // Touch
  vp.addEventListener('touchstart',function(e){
    if(e.touches.length===1){_cropDragStart={x:e.touches[0].clientX-_cropX,y:e.touches[0].clientY-_cropY};}
    else if(e.touches.length===2){_cropLastPinchDist=Math.hypot(e.touches[0].clientX-e.touches[1].clientX,e.touches[0].clientY-e.touches[1].clientY);}
    e.preventDefault();
  },{passive:false});
  vp.addEventListener('touchmove',function(e){
    if(e.touches.length===1&&_cropDragStart){
      _cropX=e.touches[0].clientX-_cropDragStart.x;
      _cropY=e.touches[0].clientY-_cropDragStart.y;
      _cropApplyTransform();
    } else if(e.touches.length===2){
      var dist=Math.hypot(e.touches[0].clientX-e.touches[1].clientX,e.touches[0].clientY-e.touches[1].clientY);
      if(_cropLastPinchDist){
        var ratio=dist/_cropLastPinchDist;
        var midX=(e.touches[0].clientX+e.touches[1].clientX)/2;
        var midY=(e.touches[0].clientY+e.touches[1].clientY)/2;
        var rect=vp.getBoundingClientRect();
        var lx=midX-rect.left, ly=midY-rect.top;
        var newScale=_cropScale*ratio;
        _cropX=lx-(lx-_cropX)*ratio;
        _cropY=ly-(ly-_cropY)*ratio;
        _cropScale=newScale;
        _cropApplyTransform();
        var zs=document.getElementById('crop-zoom');if(zs)zs.value=newScale;
      }
      _cropLastPinchDist=dist;
    }
    e.preventDefault();
  },{passive:false});
  vp.addEventListener('touchend',function(){_cropDragStart=null;_cropLastPinchDist=0;});
  // Mouse
  vp.addEventListener('mousedown',function(e){_cropDragStart={x:e.clientX-_cropX,y:e.clientY-_cropY};e.preventDefault();});
  document.addEventListener('mousemove',function(e){if(_cropDragStart&&document.getElementById('crop-viewport')){_cropX=e.clientX-_cropDragStart.x;_cropY=e.clientY-_cropDragStart.y;_cropApplyTransform();}});
  document.addEventListener('mouseup',function(){_cropDragStart=null;});
}
function cropApply(){
  var img=document.getElementById('crop-img');
  var vp=document.getElementById('crop-viewport');
  if(!img||!vp){closeCropModal();return;}
  var vw=vp.offsetWidth, vh=vp.offsetHeight;
  var canvas=document.createElement('canvas');
  var OUT_W=600, OUT_H=Math.round(600*vh/vw);
  canvas.width=OUT_W;canvas.height=OUT_H;
  var ctx=canvas.getContext('2d');
  ctx.imageSmoothingEnabled=true;
  ctx.imageSmoothingQuality='high';
  ctx.fillStyle='#ffffff';
  ctx.fillRect(0,0,OUT_W,OUT_H);
  var sx=-_cropX/_cropScale, sy=-_cropY/_cropScale;
  var sw=vw/_cropScale, sh=vh/_cropScale;
  ctx.drawImage(img,sx,sy,sw,sh,0,0,OUT_W,OUT_H);
  var dataUrl=canvas.toDataURL('image/jpeg',0.75);  // 0.92→0.75に圧縮
  // まずUIに反映（base64）
  var target=document.getElementById(_cropTargetId);
  if(target)target.innerHTML='<img src="'+dataUrl+'" alt="">';
  closeCropModal();
  // folderId判定：修理写真か工具写真か
  var folderId = (_cropTargetId==='repair-photo-area')
? '1Ecn4_iEbZk4aMlXANifRBWv7kyWaSC4w'   // 修理写真フォルダ
: '1PbgWvVE9AlGmtqdv77gOTqBuC7C4yRkd';   // 工具写真フォルダ
  // GASへアップロード（バックグラウンド）
  if(GAS_LOADED){
    toast('📷 写真をアップロード中...');
    uploadPhoto(folderId, dataUrl, function(err, url){
      if(url && url!==dataUrl){
        // URLが返ってきたらコールバックにURLを渡す
        if(_cropCallback) _cropCallback(url);
        // UIの画像はそのまま（base64表示を維持）
        toast('✅ 写真を保存しました');
      } else {
        // フォールバック: base64のままコールバック
        if(_cropCallback) _cropCallback(dataUrl);
      }
    });
  } else {
    // オフライン時はbase64のまま
    if(_cropCallback) _cropCallback(dataUrl);
  }
}

// ============================================================
// GAS通信ユーティリティ
// ============================================================
function showLoading(msg){
  var o=document.getElementById('loading-overlay');
  var m=document.getElementById('loading-msg');
  if(o){o.style.display='flex';}
  if(m)m.textContent=msg||'処理中...';
}
function hideLoading(){
  var o=document.getElementById('loading-overlay');
  if(o)o.style.display='none';
}

// GAS GETリクエスト
function gasGet(params, cb){
  var url=GAS_URL+'?';
  var parts=[];
  Object.keys(params).forEach(function(k){parts.push(encodeURIComponent(k)+'='+encodeURIComponent(params[k]));});
  url+=parts.join('&');
  fetch(url,{redirect:'follow'})
    .then(function(r){return r.json();})
    .then(function(d){cb(null,d);})
    .catch(function(e){cb(e,null);});
}

// GAS POSTリクエスト
function gasPost(body, cb){
  // GASのPOSTは302リダイレクトになるがno-corsで送信は成功する
  fetch(GAS_URL,{
    method:'POST',
    mode:'no-cors',
    headers:{'Content-Type':'text/plain'},
    body:JSON.stringify(body)
  })
  .then(function(){
    // no-corsではレスポンスボディが読めないため楽観的にokを返す
    cb(null, {status:'ok'});
  })
  .catch(function(e){cb(e,null);});
}

// ============================================================
// 写真アップロード（base64 → Google Drive → URL返却）
// ============================================================
// folderId: 'tool' か 'repair'
// base64data: 'data:image/jpeg;base64,...'
// cb(err, url) : DriveのURL or null
function uploadPhoto(folderId, base64data, cb){
  if(!base64data||base64data.indexOf('data:')<0){cb(null,'');return;}
  var parts=base64data.split(',');
  var mime=parts[0].replace('data:','').replace(';base64','');
  var b64=parts[1];
  var ext=mime.indexOf('png')>=0?'.png':'.jpg';
  var fname='photo_'+Date.now()+ext;
  // base64を小さいチャンクに分けてGETで順番に送信
  var CHUNK=1500;
  var chunks=[];
  for(var i=0;i<b64.length;i+=CHUNK) chunks.push(b64.slice(i,i+CHUNK));
  var total=chunks.length;
  function sendChunk(idx){
    if(idx>=total){
      // 全チャンク送信完了 → URLを取得
      setTimeout(function(){
        fetch(GAS_URL+'?action=getPhotoUrl&folderId='+encodeURIComponent(folderId)+'&fileName='+encodeURIComponent(fname),{redirect:'follow'})
        .then(function(r){return r.json();})
        .then(function(d){
          if(d&&d.url){cb(null,d.url);}
          else{cb(null,base64data);}
        })
        .catch(function(){cb(null,base64data);});
      },2000);
      return;
    }
    var url=GAS_URL+'?action=uploadChunk'
      +'&folderId='+encodeURIComponent(folderId)
      +'&fileName='+encodeURIComponent(fname)
      +'&mimeType='+encodeURIComponent(mime)
      +'&chunk='+encodeURIComponent(chunks[idx])
      +'&idx='+idx
      +'&total='+total;
    fetch(url,{redirect:'follow'})
    .then(function(r){return r.json();})
    .then(function(d){
      if(d&&d.status==='ok'){sendChunk(idx+1);}
      else{cb(null,base64data);}
    })
    .catch(function(){cb(null,base64data);});
  }
  toast('📷 写真をアップロード中...');
  sendChunk(0);
}

// ============================================================
// 全データ読み込み（初回）
// ============================================================
function loadAll(){
  showLoading('データを読み込んでいます...');
  gasGet({action:'getAll'},function(err,data){
    hideLoading();
    if(err||!data||data.error){
      console.warn('GAS接続失敗、ローカルデータで続行',err);
      GAS_LOADED=false;
      applyStyle();
      renderNameScreen();
      if(err) toast('⚠ オフラインモード（データは保存されません）');
      return;
    }
    // データを上書き（有効なデータのみ）
    if(data.cfg&&typeof data.cfg==='object') Object.assign(cfg, data.cfg);
    // membersは name が文字列のものだけ使う
    if(data.members&&data.members.length){
      var validMem=data.members.filter(function(m){return m&&typeof m.name==='string'&&m.name.length>0;});
      if(validMem.length) members=validMem;
    }
    if(data.sites&&data.sites.length){
      var validSites=data.sites.filter(function(s){return s&&typeof s.name==='string';});
      if(validSites.length) sites=validSites.map(function(s){
        s.leaders=Array.isArray(s.leaders)?s.leaders:['','',''];
        s.tools=Array.isArray(s.tools)?s.tools:[];
        return s;
      });
    }
    if(data.TM&&data.TM.length){
      var validTM=data.TM.filter(function(t){return t&&typeof t.name==='string';});
      if(validTM.length) TM=validTM.map(function(t){
        t.yomis=Array.isArray(t.yomis)?t.yomis:(t.yomi?[t.yomi]:[]);
        t.total=parseInt(t.total)||0;
        return t;
      });
    }
    if(data.items&&Array.isArray(data.items)) items=data.items;
    if(data.hist&&Array.isArray(data.hist)) hist=data.hist;
    if(data.repairs&&Array.isArray(data.repairs)) repairs=data.repairs;
    GAS_LOADED=true;
    applyStyle();
    renderNameScreen();
    toast('✅ データを読み込みました');
  });
}

// ============================================================
// 全データ保存（操作後に呼ぶ）
// ============================================================
function saveAll(cb){
  if(!GAS_LOADED) { if(cb)cb(); return; } // オフライン時はスキップ
  showLoading('保存中...');
  // 写真(base64)はスプレッドシートに保存しない（URLのみ保存）
  gasPost({
    action:'saveAll',
    data:{
      cfg:cfg,
      members:members,
      sites:sites,
      TM:TM.map(function(t){var p=t.photo||'';return Object.assign({},t,{photo:p.indexOf('data:')===0?'':p});}),
      items:items.map(function(x){var p=x.photo||'';return Object.assign({},x,{photo:p.indexOf('data:')===0?'':p});}),
      hist:hist,
      repairs:repairs.map(function(r){var p=r.photo||'';return Object.assign({},r,{photo:p.indexOf('data:')===0?'':p});})
    }
  },function(err,res){
    hideLoading();
    if(err||!res||res.status!=='ok'){
      console.warn('保存失敗',err,res);
      toast('⚠ 保存に失敗しました（通信エラー）');
    }
    if(cb)cb();
  });
}

// ============================================================
// 持出し・返却の差分送信（リアルタイム記録用）
// ============================================================
function gasAdjust(histEntry, itemAfterQty, cb){
  if(!GAS_LOADED){if(cb)cb();return;}
  gasPost({
    action:'adjust',
    hist:histEntry,
    itemId:histEntry.iid,
    qty:itemAfterQty
  },function(err,res){
    if(err||!res||res.status!=='ok'){
      // 失敗してもUX止めないが、saveAllでリカバリ
      console.warn('adjust送信失敗、saveAllでリカバリ');
      saveAll(cb);
      return;
    }
    if(cb)cb();
  });
}

// ============================================================
// 初期化
// ============================================================
applyStyle();
loadAll();
</script>
